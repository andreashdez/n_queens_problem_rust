name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '22 11 * * 4'

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Format, lint, build, test
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install rustfmt and clippy
      run: rustup component add rustfmt clippy
    - name: Cache Rust dependencies and build output
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ci-${{ runner.os }}
    - name: Check formatting
      run: cargo fmt --check
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  clippy-sarif:
    name: Clippy SARIF analysis
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - uses: actions/checkout@v4
    - name: Install clippy
      run: rustup component add clippy
    - name: Cache Rust dependencies and build output
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: sarif-${{ runner.os }}
    - name: Install SARIF tools
      run: |
        command -v clippy-sarif >/dev/null || cargo install --locked clippy-sarif
        command -v sarif-fmt >/dev/null || cargo install --locked sarif-fmt
    - name: Run clippy and generate SARIF
      run: cargo clippy --all-features --message-format=json | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt
      continue-on-error: true
    - name: Upload analysis results to GitHub
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: rust-clippy-results.sarif
        wait-for-processing: true
