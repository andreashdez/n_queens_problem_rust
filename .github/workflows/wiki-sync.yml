name: Sync Wiki

on:
  push:
    branches: ["main"]
    paths:
      - "src/content/docs/index.md"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    name: Publish docs page to Wiki Home
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync docs index to wiki Home
        run: |
          set -euo pipefail

          WIKI_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"

          if ! git ls-remote "$WIKI_URL" >/dev/null 2>&1; then
            echo "GitHub Wiki is not enabled or not accessible; skipping sync."
            echo "Enable Wiki in repository settings and re-run this workflow."
            exit 0
          fi

          git clone "$WIKI_URL" wiki

          python - <<'PY'
          from pathlib import Path

          source = Path("src/content/docs/index.md").read_text(encoding="utf-8")
          if source.startswith("---\n"):
              end = source.find("\n---\n", 4)
              if end != -1:
                  source = source[end + 5 :].lstrip("\n")

          destination = Path("wiki/Home.md")
          destination.write_text(source.rstrip() + "\n", encoding="utf-8")
          PY

          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WIKI_BRANCH="$(git symbolic-ref --short -q HEAD || true)"
          if [ -z "$WIKI_BRANCH" ]; then
            WIKI_BRANCH="master"
            git checkout -B "$WIKI_BRANCH"
          fi

          git add Home.md

          if git diff --cached --quiet -- Home.md; then
            echo "Wiki Home is already up to date."
            exit 0
          fi

          git commit -m "docs: sync wiki home from astro docs index"
          git push origin "HEAD:${WIKI_BRANCH}"
